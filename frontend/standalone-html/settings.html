<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Settings | Keep in Mind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5', surface: '#F8FAFC' } } } }
  </script>
</head>
<body class="bg-surface">
  <div id="app">
    <div class="max-w-6xl mx-auto w-full flex flex-col h-full p-2 md:p-6 pb-24 lg:pb-6 overflow-hidden">
      <div class="mb-8">
        <h1 class="text-4xl font-heading font-extrabold text-on-surface tracking-tight">Settings</h1>
      </div>

      <div class="flex flex-col md:flex-row gap-8 flex-1 overflow-hidden min-h-0">
        <!-- Tabs Sidebar -->
        <div class="w-full md:w-64 shrink-0 overflow-x-auto md:overflow-y-auto no-scrollbar pb-2 md:pb-0">
          <div class="flex md:flex-col gap-2" id="tabs-list">
            <!-- Tabs Injected -->
          </div>
        </div>

        <!-- Tab Content -->
        <div class="flex-1 overflow-y-auto no-scrollbar relative" id="tab-content">
          <!-- Content Injected -->
        </div>
      </div>

      <div class="absolute bottom-4 left-4 right-4 md:left-72 md:right-6 glass-panel rounded-2xl p-4 flex items-center justify-end gap-4 shadow-2xl z-20">
        <button onclick="resetSettings()" class="px-5 py-2.5 rounded-xl font-bold bg-slate-100 hover:bg-slate-200 text-slate-900 flex items-center gap-2 text-sm">
          <i data-lucide="refresh-cw" size="18"></i> Reset Defaults
        </button>
        <button onclick="UI.toast('Settings saved locally')" class="px-5 py-2.5 rounded-xl font-bold bg-primary text-white hover:bg-primary/90 flex items-center gap-2 text-sm">
          <i data-lucide="save" size="18"></i> Save Changes
        </button>
      </div>
    </div>
  </div>

  <script>
    let activeTab = 'Account';
    const settings = KimStore.getSettings();

    function renderTabs() {
      const tabs = [
        { id: 'Account', icon: 'user' },
        { id: 'Appearance', icon: 'palette' },
        { id: 'Preferences', icon: 'sliders' },
        { id: 'Security', icon: 'lock' },
        { id: 'Storage', icon: 'database' },
        { id: 'About', icon: 'info' }
      ];
      
      const list = document.getElementById('tabs-list');
      list.innerHTML = tabs.map(tab => `
        <button onclick="setTab('${tab.id}')" class="flex items-center gap-3 px-4 py-3 rounded-2xl font-semibold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-500 hover:bg-slate-100'}">
          <i data-lucide="${tab.icon}" size="20"></i>
          <span>${tab.id}</span>
        </button>
      `).join('');
      
      renderContent();
      lucide.createIcons();
    }

    function setTab(tab) {
      activeTab = tab;
      renderTabs();
    }

    function renderContent() {
      const content = document.getElementById('tab-content');
      let html = '';
      
      if (activeTab === 'Account') {
        const profile = KimStore.getProfile();
        html = `
          <div class="glass-panel p-8 rounded-[2rem] mb-8">
            <h2 class="text-2xl font-heading font-bold mb-6">Account Settings</h2>
            <div class="space-y-6">
              <div class="flex justify-between items-center py-3 border-b border-black/5">
                <div><h3 class="font-semibold text-sm uppercase text-slate-400">Profile Name</h3><p class="text-on-surface font-medium">${profile.name}</p></div>
                <button class="text-indigo-600 font-bold hover:underline">Edit</button>
              </div>
              <div class="flex justify-between items-center py-3 border-b border-black/5">
                <div><h3 class="font-semibold text-sm uppercase text-slate-400">Email</h3><p class="text-on-surface font-medium">${profile.email}</p></div>
                <button class="text-indigo-600 font-bold hover:underline">Verify</button>
              </div>
            </div>
          </div>
        `;
      } else if (activeTab === 'Appearance') {
        html = `
          <div class="glass-panel p-8 rounded-[2rem] mb-8">
            <h2 class="text-2xl font-heading font-bold mb-6">Appearance</h2>
            <div class="space-y-6">
              <div class="flex justify-between items-center py-3">
                <div><h3 class="font-semibold">Dark Mode</h3><p class="text-slate-500 text-sm">Switch between light and dark themes</p></div>
                <button onclick="toggleTheme()" class="w-14 h-7 rounded-full bg-slate-200 transition-colors duration-200 p-0.5 relative ${document.documentElement.classList.contains('dark') ? 'bg-indigo-600' : ''}">
                  <div class="w-6 h-6 bg-white rounded-full shadow transition-transform ${document.documentElement.classList.contains('dark') ? 'translate-x-7' : ''}"></div>
                </button>
              </div>
            </div>
          </div>
        `;
      } else {
        html = `<div class="glass-panel p-8 rounded-[2rem] text-center text-slate-500"><p>Content for ${activeTab} is being migrated...</p></div>`;
      }
      
      content.innerHTML = html;
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      KimStore.saveSettings({ theme: isDark ? 'dark' : 'light' });
      renderTabs();
    }

    function resetSettings() {
      if (confirm('Reset settings to default?')) {
        localStorage.clear();
        KimStore.init();
        window.location.reload();
      }
    }

    window.onload = () => { UI.injectLayout(); renderTabs(); };
  </script>
</body>
</html>
