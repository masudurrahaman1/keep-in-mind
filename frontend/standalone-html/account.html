<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Profile | Keep in Mind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5', surface: '#F8FAFC' } } } }
  </script>
</head>
<body class="bg-surface">
  <div id="app">
    <div class="max-w-4xl mx-auto w-full flex flex-col h-full p-2 md:p-6 pb-24 overflow-y-auto no-scrollbar">
      <div class="mb-8 shrink-0 mt-2">
        <h1 class="text-4xl sm:text-5xl font-heading font-extrabold text-on-surface tracking-tight">Your Profile</h1>
      </div>

      <div class="glass-panel p-8 rounded-[2.5rem] flex flex-col sm:flex-row items-center sm:items-start gap-10 relative overflow-hidden mb-8" id="profile-card">
         <!-- Injected -->
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="glass-panel p-6 rounded-3xl">
          <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="shield" size="18"></i> Security</h3>
          <p class="text-sm text-slate-500 mb-4">Last login: macOS • Chrome • Just now</p>
          <button onclick="UI.toast('Security settings opened')" class="text-indigo-600 font-bold hover:underline py-2">Enable 2FA</button>
        </div>
        <div class="glass-panel p-6 rounded-3xl">
          <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="activity" size="18"></i> Activity</h3>
          <div class="flex justify-between items-center text-sm font-medium">
            <span>Total Notes Created</span>
            <span class="text-indigo-600 font-bold" id="notes-count">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function renderProfile() {
      const profile = KimStore.getProfile();
      const count = KimStore.getNotes().length;
      document.getElementById('notes-count').innerText = count;

      const card = document.getElementById('profile-card');
      card.innerHTML = `
        <div class="w-32 h-32 shrink-0 rounded-full border-4 border-white shadow-xl bg-gradient-to-br from-indigo-500 to-sky-500 flex items-center justify-center text-4xl font-bold text-white relative z-10">
          ${profile.avatar ? `<img src="${profile.avatar}" class="w-full h-full object-cover">` : profile.name.substring(0,2).toUpperCase()}
        </div>
        <div class="flex-1 text-center sm:text-left z-10">
          <h2 class="text-3xl font-heading font-extrabold text-on-surface mb-1">${profile.name}</h2>
          <p class="text-slate-500 font-medium mb-4">${profile.bio}</p>
          <div class="flex flex-col sm:flex-row gap-4 mb-6 text-sm">
            <div class="flex items-center gap-2"><i data-lucide="mail" size="16"></i> ${profile.email}</div>
          </div>
          <button onclick="UI.toast('Edit modal opening...')" class="px-5 py-2.5 rounded-full font-bold bg-slate-100 hover:bg-slate-200 text-slate-900 flex items-center gap-2">
            <i data-lucide="edit-2" size="18"></i> Edit Profile
          </button>
        </div>
      `;
      lucide.createIcons();
    }
    window.onload = () => { UI.injectLayout(); renderProfile(); };
  </script>
</body>
</html>
