<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Recent | Keep in Mind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#0EA5E9',
            surface: '#F8FAFC',
            'on-surface': '#0F172A',
            'on-surface-variant': '#475569',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface">
  
  <div id="app">
    <div class="max-w-7xl mx-auto w-full flex flex-col h-full p-2 md:p-6">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-sky-500 flex items-center justify-center text-white shadow-lg">
          <i data-lucide="clock" size="24" strokeWidth="2.5"></i>
        </div>
        <h1 class="text-4xl font-heading font-extrabold text-on-surface tracking-tight">
          Recently <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-sky-500">Opened</span>
        </h1>
      </div>

      <div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 auto-rows-max" id="recent-grid">
        <!-- Notes Injected -->
      </div>
    </div>
  </div>

  <script>
    function renderRecent() {
      const notes = KimStore.getNotes();
      const grid = document.getElementById('recent-grid');
      
      grid.innerHTML = notes.map(note => `
        <div class="group rounded-[2rem] p-6 border backdrop-blur-xl transition-all relative overflow-hidden hover:scale-[1.02] ${note.color}">
          <div class="flex justify-between items-start mb-4 relative z-10">
            <h3 class="font-heading font-bold text-xl leading-snug line-clamp-2 text-on-surface">${note.title}</h3>
            <i data-lucide="clock" size="18" class="text-on-surface-variant opacity-40"></i>
          </div>
          <p class="text-sm text-on-surface-variant/90 line-clamp-4 whitespace-pre-wrap leading-relaxed relative z-10 font-medium">${note.content}</p>
          <div class="mt-6 flex items-center justify-between opacity-60 text-on-surface-variant relative z-10">
            <span class="text-xs font-bold tracking-wider uppercase flex items-center gap-1.5">
              <i data-lucide="clock" size="12"></i> ${note.date}
            </span>
          </div>
        </div>
      `).join('');
      
      if (notes.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-center text-on-surface-variant py-20">No recent activity found.</p>';
      }
      lucide.createIcons();
    }

    window.onload = () => {
      UI.injectLayout();
      renderRecent();
      
      document.getElementById('global-search').addEventListener('input', (e) => {
        // Search could filter this too
      });
    };
  </script>
</body>
</html>
