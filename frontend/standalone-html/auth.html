<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Login | Keep in Mind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            surface: '#F8FAFC',
            'surface-container-low': '#F1F5F9',
            'on-surface': '#0F172A',
            'on-surface-variant': '#475569',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface bg-mesh min-h-screen flex items-center justify-center p-4">
  
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 -left-20 w-80 h-80 bg-indigo-500/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-sky-500/20 rounded-full blur-[100px]"></div>
  </div>

  <div class="w-full max-w-md glass-panel p-8 sm:p-12 rounded-[2.5rem] relative z-10">
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-primary text-white mx-auto rounded-2xl flex items-center justify-center mb-6 shadow-xl shadow-primary/30">
        <i data-lucide="file-text" size="32"></i>
      </div>
      <h1 class="text-4xl font-heading font-extrabold text-on-surface tracking-tight mb-2">Welcome Back</h1>
      <p class="text-on-surface-variant font-medium">Please enter your details to sign in</p>
    </div>

    <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='index.html';">
      <div class="space-y-2">
        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Email Address</label>
        <div class="relative group">
          <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" size="18"></i>
          <input type="email" placeholder="name@example.com" required class="w-full bg-white/50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Password</label>
        <div class="relative group">
          <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" size="18"></i>
          <input type="password" placeholder="••••••••" required class="w-full bg-white/50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
        </div>
      </div>

      <div class="flex items-center justify-between text-sm pt-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
          <span class="text-on-surface-variant">Remember me</span>
        </label>
        <a href="#" class="text-primary font-bold hover:underline">Forgot?</a>
      </div>

      <button type="submit" class="w-full bg-primary text-white rounded-2xl py-4 font-bold shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:scale-[1.02] active:scale-95 transition-all">
        Sign In
      </button>
    </form>

    <div class="mt-8 text-center text-on-surface-variant text-sm font-medium">
      Don't have an account? <a href="#" class="text-primary font-bold hover:underline">Create one</a>
    </div>
  </div>

  <script>
    lucide.createIcons();
    // Pre-init theme
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
       document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
