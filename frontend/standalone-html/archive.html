<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Health Space | Keep in Mind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5', surface: '#F8FAFC' } } } }
  </script>
</head>
<body class="bg-surface">
  <div id="app">
    <div class="max-w-7xl mx-auto w-full flex flex-col h-full p-2 md:p-6 pb-24 lg:pb-6">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center text-white shadow-lg">
          <i data-lucide="activity" size="24" strokeWidth="2.5"></i>
        </div>
        <h1 class="text-4xl font-heading font-extrabold text-on-surface tracking-tight">
          Health <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-500">Space</span>
        </h1>
      </div>

      <div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 auto-rows-max" id="archive-grid">
         <!-- Injected -->
      </div>
      
      <div id="empty-archive" class="hidden col-span-full py-24 flex flex-col items-center justify-center text-center">
        <div class="w-24 h-24 glass-panel rounded-full flex items-center justify-center mb-8 shadow-lg shadow-cyan-500/5">
          <i data-lucide="activity" class="text-cyan-500/50" size="40"></i>
        </div>
        <h2 class="text-3xl font-heading font-bold text-on-surface mb-4">No health notes</h2>
        <p class="max-w-md mx-auto text-base text-on-surface-variant leading-relaxed">Capture your well-being and routines here.</p>
      </div>
    </div>
  </div>

  <script>
    function renderArchive() {
      const notes = KimStore.getNotes().filter(n => n.category === 'Health' || n.title.toLowerCase().includes('health'));
      const grid = document.getElementById('archive-grid');
      const empty = document.getElementById('empty-archive');
      
      if (notes.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        grid.innerHTML = notes.map(note => `
          <div class="group rounded-[2rem] p-6 border backdrop-blur-xl transition-all relative overflow-hidden ${note.color}">
            <h3 class="font-heading font-bold text-xl leading-snug text-on-surface mb-2">${note.title}</h3>
            <p class="text-sm text-on-surface-variant/90 line-clamp-4 leading-relaxed font-medium">${note.content}</p>
          </div>
        `).join('');
      }
      lucide.createIcons();
    }
    window.onload = () => { UI.injectLayout(); renderArchive(); };
  </script>
</body>
</html>
