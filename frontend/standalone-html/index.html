<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>My Notes | Keep in Mind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#0EA5E9',
            tertiary: '#10B981',
            surface: '#F8FAFC',
            'surface-container-low': '#F1F5F9',
            'surface-container-high': '#CBD5E1',
            'on-surface': '#0F172A',
            'on-surface-variant': '#475569',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface">
  
  <div id="app">
    <div class="max-w-7xl mx-auto w-full flex flex-col h-full p-2 md:p-6">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-6">
        <h1 class="text-4xl font-heading font-extrabold text-on-surface tracking-tight">
          My <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-sky-500">Notes</span>
        </h1>
        
        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1 backdrop-blur-md bg-white/30 dark:bg-black/20 p-1.5 rounded-full border border-white/10 shadow-sm" id="filter-bar">
          <!-- Filters Injected -->
        </div>
      </div>

      <div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 auto-rows-max" id="notes-grid">
        <!-- Notes Injected -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden col-span-full py-24 flex flex-col items-center justify-center text-center px-4">
        <div class="w-24 h-24 glass-panel rounded-full flex items-center justify-center mb-8 shadow-lg shadow-indigo-500/5">
          <i data-lucide="file-text" class="text-indigo-500/50" size="40"></i>
        </div>
        <h2 class="text-3xl font-heading font-bold text-on-surface mb-4">It's empty here</h2>
        <p class="max-w-md mx-auto text-base text-on-surface-variant mb-10 leading-relaxed">Capture your ideas, lists, and thoughts. Experience absolute clarity by creating your first note.</p>
        <button onclick="handleCreateNote()" class="flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-indigo-500 to-sky-500 text-white rounded-2xl font-bold shadow-xl shadow-indigo-500/20 active:scale-95 transition-all">
          <i data-lucide="plus" size="24" strokeWidth="3"></i>
          <span class="text-lg">Create Note</span>
        </button>
      </div>

      <!-- Floating Action Button (Mobile) -->
      <button onclick="handleCreateNote()" class="sm:hidden fixed bottom-24 right-6 w-16 h-16 bg-gradient-to-br from-indigo-500 to-sky-500 text-white rounded-[1.25rem] shadow-2xl flex items-center justify-center active:scale-90 transition-all z-40">
        <i data-lucide="plus" size="32" stroke-width="2.5"></i>
      </button>
    </div>
  </div>

  <!-- Note Modal Template -->
  <div id="modal-container" class="hidden">
    <!-- Modal HTML Injected -->
  </div>

  <script>
    let filterActive = 'All';
    let searchQuery = '';

    function renderNotes() {
      const notes = KimStore.getNotes();
      const grid = document.getElementById('notes-grid');
      const empty = document.getElementById('empty-state');
      
      const filtered = notes.filter(n => {
        const matchesSearch = n.title.toLowerCase().includes(searchQuery.toLowerCase()) || n.content.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesFilter = filterActive === 'All' || n.category === filterActive;
        return matchesSearch && matchesFilter;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        grid.innerHTML = filtered.map(note => `
          <div onclick="editNote(${note.id})" class="group cursor-pointer rounded-[2rem] p-6 border backdrop-blur-xl transition-all relative break-inside-avoid shadow-sm overflow-hidden hover:scale-[1.02] hover:-translate-y-1 ${note.color}">
            <div class="flex justify-between items-start mb-4 relative z-10">
              <h3 class="font-heading font-bold text-xl leading-snug line-clamp-2 pr-8 text-on-surface group-hover:text-indigo-600 transition-colors">${note.title}</h3>
              <button class="opacity-0 group-hover:opacity-100 p-2 hover:bg-black/5 rounded-full transition-all absolute -top-1 -right-1">
                <i data-lucide="more-horizontal" size="18"></i>
              </button>
            </div>
            <p class="text-sm text-on-surface-variant/90 line-clamp-5 whitespace-pre-wrap leading-relaxed relative z-10 font-medium">${note.content}</p>
            <div class="mt-6 flex items-center justify-between opacity-60 text-on-surface-variant relative z-10">
              <span class="text-xs font-bold tracking-wider uppercase">${note.date}</span>
              ${note.type === 'list' ? '<i data-lucide="check-square" size="16"></i>' : ''}
            </div>
          </div>
        `).join('');

        // Add "Add Note" placeholder for desktop
        if (!searchQuery) {
          grid.innerHTML += `
            <div onclick="handleCreateNote()" class="hidden sm:flex flex-col items-center justify-center rounded-[2rem] p-6 border-2 border-dashed border-slate-300 hover:bg-slate-100/30 hover:border-indigo-500/50 transition-all cursor-pointer min-h-[220px] group backdrop-blur-sm">
              <div class="w-16 h-16 rounded-2xl glass-panel group-hover:bg-indigo-500/10 flex items-center justify-center mb-4 transition-all">
                <i data-lucide="plus" size="32" class="text-slate-400 group-hover:text-indigo-600 transition-colors"></i>
              </div>
              <span class="font-heading font-bold text-slate-400 group-hover:text-indigo-600 transition-colors">Start typing...</span>
            </div>
          `;
        }
      }
      lucide.createIcons();
    }

    function renderFilters() {
      const filters = ['All', 'Personal', 'Work', 'Ideas', 'Urgent'];
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = filters.map(f => `
        <button onclick="setFilter('${f}')" class="px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all duration-300 ${filterActive === f ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-on-surface hover:bg-slate-200/50'}">
          ${f}
        </button>
      `).join('');
    }

    function setFilter(f) {
      filterActive = f;
      renderFilters();
      renderNotes();
    }

    function handleCreateNote() {
      openModal({ title: '', content: '', color: 'glass-panel', isNew: true });
    }

    function editNote(id) {
      const note = KimStore.getNotes().find(n => n.id === id);
      openModal(note);
    }

    function openModal(note) {
      const container = document.getElementById('modal-container');
      container.classList.remove('hidden');
      
      const COLORS = [
        { name: 'Default', value: 'glass-panel', text: 'text-on-surface' },
        { name: 'Blue', value: 'bg-indigo-500/10 border-indigo-500/20', text: 'text-indigo-400' },
        { name: 'Emerald', value: 'bg-emerald-500/10 border-emerald-500/20', text: 'text-emerald-400' },
        { name: 'Amber', value: 'bg-amber-500/10 border-amber-500/20', text: 'text-amber-400' },
        { name: 'Rose', value: 'bg-rose-500/10 border-rose-500/20', text: 'text-rose-400' }
      ];

      container.innerHTML = `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
          <div class="w-full max-w-2xl glass-panel rounded-[2rem] overflow-hidden shadow-2xl relative z-10 flex flex-col max-h-[90vh] ${note.color} ${note.textColor || ''}">
            <div class="p-6 flex-1 overflow-y-auto">
              <input type="text" id="modal-title" value="${note.title}" placeholder="Title" class="w-full bg-transparent border-none text-2xl font-heading font-bold focus:outline-none placeholder:opacity-50 mb-4">
              <textarea id="modal-content" placeholder="Start typing..." class="w-full bg-transparent border-none resize-none focus:outline-none placeholder:opacity-50 min-h-[300px] text-lg leading-relaxed">${note.content}</textarea>
            </div>
            <div class="p-6 border-t border-white/10 bg-black/5 flex items-center justify-between">
              <div class="flex items-center gap-2">
                ${COLORS.map(c => `
                  <button onclick="updateModalColor('${c.value}', '${c.text}')" class="w-8 h-8 rounded-full border border-white/10 ${c.value} transition-transform hover:scale-110 active:scale-90"></button>
                `).join('')}
              </div>
              <div class="flex items-center gap-3">
                <button onclick="closeModal()" class="px-5 py-2 rounded-full font-medium hover:bg-black/5 transition-colors">Cancel</button>
                <button onclick="saveModalNote(${note.id || 'null'})" class="px-5 py-2 rounded-full font-bold bg-black/10 hover:bg-black/20 transition-colors">Save</button>
              </div>
            </div>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    function closeModal() {
      document.getElementById('modal-container').classList.add('hidden');
    }

    function updateModalColor(val, txt) {
      const modal = document.querySelector('#modal-container > div > div:last-child');
      modal.className = `w-full max-w-2xl glass-panel rounded-[2rem] overflow-hidden shadow-2xl relative z-10 flex flex-col max-h-[90vh] transition-colors duration-300 ${val} ${txt}`;
    }

    function saveModalNote(id) {
      const title = document.getElementById('modal-title').value;
      const content = document.getElementById('modal-content').value;
      const modal = document.querySelector('#modal-container > div > div:last-child');
      const colorClass = Array.from(modal.classList).find(c => c.includes('bg-') || c.includes('glass-panel'));
      const textClass = Array.from(modal.classList).find(c => c.includes('text-') && !c.includes('on-surface'));
      
      const note = {
        id: id || null,
        title,
        content,
        color: colorClass,
        textColor: textClass || 'text-on-surface',
        category: filterActive === 'All' ? 'Personal' : filterActive
      };
      
      KimStore.saveNote(note);
      closeModal();
      renderNotes();
      UI.toast('Note saved successfully');
    }

    window.onload = () => {
      UI.injectLayout();
      renderFilters();
      renderNotes();
      
      document.getElementById('global-search').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderNotes();
      });

      // Handle "New" from BottomNav
      if (new URLSearchParams(window.location.search).get('new')) {
        handleCreateNote();
      }
    };
  </script>
</body>
</html>
